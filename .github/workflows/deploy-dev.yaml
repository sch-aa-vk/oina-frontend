name: Deploy DEV Frontend

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install CDK dependencies
        run: cd cdk && npm ci

      - name: Synth CDK app
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME_DEV }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN_DEV }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          STAGE_NAME: dev
        run: cd cdk && npm run synth

      - name: Deploy to AWS using CDK
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME_DEV }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN_DEV }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          STAGE_NAME: dev
        run: cd cdk && npm run deploy -- --require-approval never
      